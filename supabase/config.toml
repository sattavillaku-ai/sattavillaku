# Supabase Configuration
project_id = "your_project_id"

[api]
port = 54321
host = "127.0.0.1"

[auth]
enable_signup = true
site_url = "https://sattavillaku.com"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "சட்டவிளக்கு — உங்கள் கணக்கை உறுதிப்படுத்துங்கள்"
content = """
<h2>சட்டவிளக்கு இதழுக்கு வரவேற்கிறோம்!</h2>
<p>கீழே உள்ள இணைப்பைக் கிளிக் செய்து உங்கள் கணக்கை உறுதிப்படுத்தவும்:</p>
<p><a href="{{ .ConfirmationURL }}">கணக்கை உறுதிப்படுத்து</a></p>
"""

[auth.email.template.magic_link]
subject = "சட்டவிளக்கு — உள்நுழைவு இணைப்பு"
content = """
<h2>சட்டவிளக்கு</h2>
<p>உங்கள் கணக்கில் உள்நுழைய கீழே உள்ள இணைப்பைக் கிளிக் செய்யவும்:</p>
<p><a href="{{ .ConfirmationURL }}">உள்நுழையவும்</a></p>
"""

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "https://sattavillaku.com/api/auth/callback"

[storage.buckets.magazine-assets]
public = true
file_size_limit = "5MB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "application/pdf"]

[storage.buckets.premium-pdfs]
public = false
file_size_limit = "20MB"
allowed_mime_types = ["application/pdf"]
